version: "3.8"

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: yemen-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: yemen_malnutrition
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yemen-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: yemen-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - yemen-network

  # FastAPI Backend
  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: yemen-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/yemen_malnutrition
      - REDIS_URL=redis://redis:6379/0
      - JWT_SECRET_KEY=${JWT_SECRET_KEY:-your-jwt-secret}
      - SECRET_KEY=${SECRET_KEY:-your-secret-key}
      - DEBUG=false
      - ENVIRONMENT=production
    volumes:
      - ./data/models:/app/data/models
      - ./knowledge_base:/app/knowledge_base
      - ./logs:/app/logs
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yemen-network
    restart: unless-stopped

  # React Frontend
  frontend:
    build:
      context: .
      dockerfile: docker/frontend/Dockerfile
    container_name: yemen-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - yemen-network
    restart: unless-stopped

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: yemen-nginx
    ports:
      - "80:80"
            # - "443:443"  # Disabled until SSL certificates are provisioned
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf
            # - ./docker/nginx/ssl:/etc/nginx/ssl  # Disabled: create ssl/ dir with certs to enable HTTPS
    depends_on:
      - backend
      - frontend
    networks:
      - yemen-network
    restart: unless-stopped

  # Prometheus Monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: yemen-prometheus
    volumes:
      - ./devops/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - yemen-network

  # Grafana Dashboard
  grafana:
    image: grafana/grafana:latest
    container_name: yemen-grafana
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./devops/monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./devops/monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    ports:
      - "3001:3000"
    depends_on:
      - prometheus
    networks:
      - yemen-network

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  yemen-network:
    driver: bridge
